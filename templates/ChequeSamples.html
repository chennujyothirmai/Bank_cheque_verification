{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheque Samples | Bank Cheque Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif;}
body {
    min-height: 100vh;
    color: #1d1d1f;
    background-image: url('{% static "images/bg.jpg" %}');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}
.overlay {
    min-height: 100vh;
    background: linear-gradient(rgba(255,255,255,0.35), rgba(255,255,255,0.45));
    backdrop-filter: blur(2px);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content: space-between;
    align-items: center;
    padding:22px 70px;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(0,0,0,0.08);
}
.navbar-brand {
    font-size: 1.7rem;
    font-weight: 700;
}
.navbar ul {
    list-style:none;
    display:flex;
    gap: 25px;
}
.navbar ul li a {
    text-decoration:none;
    color:#1d1d1f;
    font-weight:500;
    padding:8px 14px;
    border-radius:10px;
    transition:0.25s;
}
.navbar ul li a:hover { background: rgba(0,0,0,0.05); }
.navbar ul li a.active { background: rgba(0,122,255,0.15); color:#007aff; font-weight:600; }

/* CONTENT */
.content {
    padding: 80px 60px;
}
.glass-card {
    max-width: 1100px;
    margin:auto;
    padding:40px;
    background: rgba(255,255,255,0.85);
    border-radius: 26px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.12);
}
.glass-card h1 { font-size:2.4rem; margin-bottom: 25px; text-align:center; }
.samples-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
}
.sample-box {
    background: rgba(255,255,255,0.7);
    padding: 15px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
}
.sample-box img {
    width: 100%;
    border-radius: 12px;
    border: 3px solid #ffc107;
}

/* FOOTER */
footer {
    margin-top: 50px;
    padding:20px;
    text-align:center;
    font-size:0.9rem;
}

/* TOAST ALERTS */
.toast-container {
    position: fixed;
    top: 110px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.toast {
    min-width: 320px;
    padding: 16px 20px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    animation: slideIn 0.6s ease forwards;
}
.toast.success { background: rgba(40, 167, 69, 0.15); color: #1e7e34; border-left: 5px solid #28a745; }
.toast.error { background: rgba(220, 53, 69, 0.15); color: #a71d2a; border-left: 5px solid #dc3545; }
.toast.warning { background: rgba(255, 193, 7, 0.18); color: #856404; border-left: 5px solid #ffc107; }
.toast.info { background: rgba(23, 162, 184, 0.18); color: #0c5460; border-left: 5px solid #17a2b8; }

.close-btn {
    margin-left: auto;
    cursor: pointer;
    font-weight: bold;
    opacity: 0.6;
}
@keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* MOBILE RESPONSIVE FIXES */
@media (max-width: 768px) {
    html, body { overflow-x: hidden; width: 100vw; max-width: 100vw; }
    .navbar { flex-direction: column; padding: 12px 10px; gap: 12px; }
    .navbar-brand { font-size: 1.25rem !important; }
    .navbar ul { flex-wrap: nowrap !important; justify-content: space-evenly; width: 100%; gap: 0; padding: 0; margin: 0; }
    .navbar ul li a { font-size: 0 !important; padding: 8px 12px !important; }
    .navbar ul li a i { font-size: 1.5rem !important; display: block; }
    .content { padding: 25px 15px; }
    .glass-card { padding: 20px; margin: 0; width: 100%; box-sizing: border-box; }
    .glass-card h1 { font-size: 1.6rem !important; }
    .samples-grid { grid-template-columns: 1fr; gap: 15px; }
    .sample-box { padding: 8px; width: 100%; box-sizing: border-box; }
    .sample-box img { max-width: 100%; height: auto; object-fit: contain; }
}
</style>
</head>

<body>
<div class="overlay">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-brand">🏦 Bank Cheque Verification</div>
    <ul>
        <li><a href="{%url 'userhome'%}"><i class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="{%url 'ChequeSamples'%}" class="active"><i class="fa-solid fa-chart-line"></i> Cheques Samples</a></li>
        <li><a href="{%url 'model_evaluation'%}"><i class="fa-solid fa-microscope"></i> Model Evaluation</a></li>
        <li><a href="{%url 'prediction'%}"><i class="fa-solid fa-display"></i> Prediction</a></li>
        <li><a href="{% url 'logout' %}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>
</nav>

<!-- MAIN CONTENT -->
<div class="content">
    <div class="glass-card">
        <h1>Cheque Dataset Samples</h1>

        <div class="samples-grid">
            <div class="sample-box"><img src="{% static 'samples/Cheque083654.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque083655.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque083656.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque083657.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque083658.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque100828.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque100829.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque100830.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque100831.jpg' %}" alt="Cheque"></div>
            <div class="sample-box"><img src="{% static 'samples/Cheque100832.jpg' %}" alt="Cheque"></div>
        </div>

    </div>
</div>

<footer>
<footer>   © 2026 Bank Cheque Verification System | Powered by Gemini AI</footer>
</footer>

<script>
document.querySelectorAll('.toast').forEach(function(toast){
    toast.querySelector('.close-btn')
         .addEventListener('click', ()=> toast.remove());
    setTimeout(()=> toast.remove(), 4000);
});
</script>

</div>
</body>
</html>
